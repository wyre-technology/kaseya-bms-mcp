# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - kaseyaBmsTenantSubdomain
    properties:
      kaseyaBmsTenantSubdomain:
        type: string
        description: Tenant subdomain (e.g. 'yourcompany')
      kaseyaBmsApiToken:
        type: string
        description: BMS API token (omit if using Kaseya One token)
      kaseyaBmsK1Token:
        type: string
        description: Kaseya One SSO token (alternative to API token)
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { KASEYA_BMS_TENANT_SUBDOMAIN: config.kaseyaBmsTenantSubdomain, KASEYA_BMS_API_TOKEN: config.kaseyaBmsApiToken, KASEYA_BMS_K1_TOKEN: config.kaseyaBmsK1Token, MCP_TRANSPORT: 'stdio' } })
